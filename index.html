<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TLM Claim Dashboard - รพ.เสลภูมิ</title>
    
    <!-- นำเข้า Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- นำเข้า FontAwesome สำหรับ Icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- นำเข้า React และ ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- นำเข้า Babel สำหรับคอมไพล์ JSX ในหน้าเว็บ -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        // กำหนด Custom Colors ให้ Tailwind
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            500: '#3b82f6',
                            600: '#2563eb',
                            900: '#0f172a', // สี Sidebar แบบ IP-Dashboard
                        },
                        background: '#f4f7fe', // พื้นหลังแดชบอร์ดสมัยใหม่
                    },
                    boxShadow: {
                        'card': '0px 4px 20px rgba(0, 0, 0, 0.03)',
                        'soft': '0px 10px 40px rgba(0, 0, 0, 0.03)',
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f4f7fe; }
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap');
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="text-slate-700 antialiased overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // URL ของ API จาก Google Apps Script
        const GAS_API_URL = "https://script.google.com/macros/s/AKfycbx0PKi_rileifhE0y-43sTRfPbY0Ok9nyqowcGwF1Tiveplfr2LGg1ttc-TFiPNuXeU/exec"; 
        
        function App() {
            const [currentView, setCurrentView] = useState('dashboard');
            const [isAdmin, setIsAdmin] = useState(false);
            const [isSidebarOpen, setIsSidebarOpen] = useState(true); 
            
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');
            const [loginError, setLoginError] = useState('');
            const [searchQuery, setSearchQuery] = useState('');

            // Data State
            const [mockData, setMockData] = useState([]);
            const [mockStatement, setMockStatement] = useState([]);
            const [isLoading, setIsLoading] = useState(true);
            const [fetchError, setFetchError] = useState('');

            useEffect(() => {
                const fetchData = async () => {
                    try {
                        const response = await fetch(GAS_API_URL);
                        const result = await response.json();
                        
                        setMockData(result.data || []);
                        setMockStatement(result.statement || []);
                        setIsLoading(false);
                    } catch (error) {
                        console.error("Error fetching data:", error);
                        setFetchError(error.message || "ไม่สามารถดึงข้อมูลได้ กรุณาตรวจสอบการเชื่อมต่อ");
                        setIsLoading(false);
                    }
                };

                fetchData();
                
                if (window.innerWidth < 1024) {
                    setIsSidebarOpen(false);
                }
            }, []);

            const handleLogin = (e) => {
                e.preventDefault();
                if (username === 'admin' && password === '1234') {
                    setIsAdmin(true);
                    setCurrentView('individual-check');
                    setLoginError('');
                } else {
                    setLoginError('ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง (ทดสอบ: admin / 1234)');
                }
            };

            const handleLogout = () => {
                setIsAdmin(false);
                setCurrentView('dashboard');
                setUsername('');
                setPassword('');
                setSearchQuery('');
            };

            const formatCurrency = (amount) => {
                return new Intl.NumberFormat('th-TH', { style: 'currency', currency: 'THB' }).format(amount || 0);
            };

            const dashboardStats = useMemo(() => {
                const totalRecords = mockData.length;
                let totalClaim = 0;
                let totalPaid = 0;
                let successCount = 0;
                let pendingCount = 0;

                mockData.forEach(item => {
                    const claimVal = parseFloat(item.claim) || 0;
                    const paidVal = parseFloat(item.paid) || 0;
                    totalClaim += claimVal;
                    totalPaid += paidVal;
                    
                    if (item.status && item.status.includes("ได้รับชดเชยแล้ว")) successCount++;
                    if (item.status && (item.status.includes("ยังไม่ได้รับชดเชย") || item.status.includes("รอ") || item.status.includes("#N/A"))) pendingCount++;
                });

                return { totalRecords, totalClaim, totalPaid, successCount, pendingCount };
            }, [mockData]);

            // ==========================================
            // 1. Sidebar Component (อิงสไตล์ IP-Dashboard)
            // ==========================================
            const renderSidebar = () => (
                <aside className={`fixed inset-y-0 left-0 z-50 w-[260px] bg-[#0b1437] text-white transition-transform duration-300 ease-in-out transform ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full'} lg:translate-x-0 lg:static flex flex-col shadow-2xl`}>
                    
                    {/* Logo Section */}
                    <div className="flex items-center justify-center h-[90px] border-b border-white/10 mt-2">
                        <div className="flex items-center px-4 w-full justify-center">
                            <div className="bg-gradient-to-br from-blue-500 to-blue-700 text-white p-2.5 rounded-xl mr-3 shadow-lg">
                                <i className="fa-solid fa-droplet text-xl"></i>
                            </div>
                            <div>
                                <h1 className="text-white font-bold text-xl tracking-wide">TLM Claim</h1>
                                <p className="text-blue-300 text-[11px] uppercase tracking-wider font-semibold">รพ.เสลภูมิ</p>
                            </div>
                        </div>
                        <button className="lg:hidden absolute right-4 text-slate-400 hover:text-white" onClick={() => setIsSidebarOpen(false)}>
                            <i className="fa-solid fa-xmark text-xl"></i>
                        </button>
                    </div>

                    {/* Menu Section */}
                    <div className="flex flex-col flex-1 py-6 px-4 space-y-1.5 overflow-y-auto">
                        <p className="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-3 ml-3">Menu</p>
                        
                        <button 
                            onClick={() => { setCurrentView('dashboard'); if(window.innerWidth < 1024) setIsSidebarOpen(false); }}
                            className={`flex items-center w-full px-4 py-3.5 text-sm font-medium rounded-xl transition-all duration-200 ${currentView === 'dashboard' ? 'bg-brand-600 text-white shadow-md shadow-blue-900/40' : 'text-slate-300 hover:bg-white/5 hover:text-white'}`}
                        >
                            <i className={`fa-solid fa-chart-pie w-6 text-lg ${currentView === 'dashboard' ? 'text-white' : 'text-blue-400'}`}></i> 
                            <span className="ml-1">ภาพรวมข้อมูล</span>
                        </button>

                        <button 
                            onClick={() => { 
                                if(isAdmin) { setCurrentView('individual-check'); } else { setCurrentView('admin-login'); }
                                if(window.innerWidth < 1024) setIsSidebarOpen(false);
                            }}
                            className={`flex items-center w-full px-4 py-3.5 text-sm font-medium rounded-xl transition-all duration-200 ${currentView === 'individual-check' ? 'bg-brand-600 text-white shadow-md shadow-blue-900/40' : 'text-slate-300 hover:bg-white/5 hover:text-white'} ${(currentView === 'admin-login' && !isAdmin) ? 'bg-white/10 text-white' : ''}`}
                        >
                            <i className={`fa-solid fa-users-viewfinder w-6 text-lg ${currentView === 'individual-check' ? 'text-white' : 'text-emerald-400'}`}></i> 
                            <span className="ml-1">ตรวจสอบรายบุคคล</span>
                            {!isAdmin && <i className="fa-solid fa-lock text-[10px] ml-auto bg-slate-800 p-1.5 rounded-full"></i>}
                        </button>
                    </div>

                    {/* Profile/Admin Section at bottom */}
                    <div className="p-5 mx-4 mb-6 rounded-2xl bg-gradient-to-b from-white/10 to-white/5 border border-white/10">
                        {isAdmin ? (
                            <div className="flex flex-col items-center text-center">
                                <div className="w-12 h-12 rounded-full bg-emerald-500/20 text-emerald-400 flex items-center justify-center mb-2 border border-emerald-500/30">
                                    <i className="fa-solid fa-user-shield text-xl"></i>
                                </div>
                                <h4 className="text-white text-sm font-bold">Admin Mode</h4>
                                <p className="text-emerald-400 text-xs mb-4">เชื่อมต่อระบบแล้ว</p>
                                <button 
                                    onClick={handleLogout}
                                    className="w-full py-2 text-xs font-bold text-white bg-red-500/80 hover:bg-red-500 rounded-lg transition-colors"
                                >
                                    ออกจากระบบ
                                </button>
                            </div>
                        ) : (
                            <div className="flex flex-col items-center text-center">
                                <div className="w-12 h-12 rounded-full bg-white/10 text-slate-300 flex items-center justify-center mb-2">
                                    <i className="fa-solid fa-shield-halved text-xl"></i>
                                </div>
                                <p className="text-slate-300 text-xs mb-3">เข้าสู่ระบบเพื่อดูข้อมูลเชิงลึก</p>
                                <button 
                                    onClick={() => { setCurrentView('admin-login'); if(window.innerWidth < 1024) setIsSidebarOpen(false); }}
                                    className="w-full py-2 text-xs font-bold text-slate-900 bg-white hover:bg-slate-100 rounded-lg transition-colors shadow-sm"
                                >
                                    เข้าสู่ระบบ Admin
                                </button>
                            </div>
                        )}
                    </div>
                </aside>
            );

            // ==========================================
            // 2. Header Component
            // ==========================================
            const renderHeader = () => (
                <header className="bg-background/80 backdrop-blur-md h-[90px] px-4 sm:px-8 flex items-center justify-between sticky top-0 z-40">
                    <div className="flex items-center">
                        <button 
                            className="lg:hidden mr-4 w-10 h-10 bg-white rounded-xl shadow-sm text-slate-600 flex items-center justify-center hover:text-brand-600"
                            onClick={() => setIsSidebarOpen(true)}
                        >
                            <i className="fa-solid fa-bars"></i>
                        </button>
                        <div>
                            {/* Breadcrumb style */}
                            <div className="text-[12px] font-medium text-slate-500 mb-1 hidden sm:block">
                                Pages / <span className="text-brand-600 font-semibold">
                                    {currentView === 'dashboard' ? 'Dashboard' : currentView === 'admin-login' ? 'Login' : 'Search'}
                                </span>
                            </div>
                            <h2 className="text-2xl font-bold text-slate-800 tracking-tight">
                                {currentView === 'dashboard' && 'ภาพรวมการเบิกจ่ายชดเชย'}
                                {currentView === 'admin-login' && 'ยืนยันตัวตน (Admin)'}
                                {currentView === 'individual-check' && 'ตรวจสอบข้อมูลผู้ป่วย'}
                            </h2>
                        </div>
                    </div>
                    
                    <div className="flex items-center space-x-4">
                        {/* Status Indicator */}
                        <div className="hidden md:flex items-center bg-white px-4 py-2.5 rounded-full shadow-sm text-sm font-medium text-slate-600">
                            <span className="relative flex h-2.5 w-2.5 mr-2">
                              <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                              <span className="relative inline-flex rounded-full h-2.5 w-2.5 bg-emerald-500"></span>
                            </span>
                            เชื่อมต่อ API สำเร็จ
                        </div>
                        
                        {/* Profile Mockup */}
                        <div className="flex items-center bg-white p-1.5 rounded-full shadow-sm cursor-pointer border border-slate-100">
                            <img src="https://ui-avatars.com/api/?name=Admin+TLM&background=3b82f6&color=fff&rounded=true&bold=true" alt="profile" className="w-9 h-9 rounded-full" />
                        </div>
                    </div>
                </header>
            );

            // ==========================================
            // 3. Dashboard View (Summary Cards แบบใหม่)
            // ==========================================
            const renderDashboard = () => (
                <div className="space-y-6 fade-in">
                    
                    {/* Modern Summary Cards */}
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                        
                        {/* Card 1 */}
                        <div className="bg-white rounded-2xl p-5 shadow-card flex items-center justify-between border border-slate-100/50 hover:shadow-soft transition-shadow">
                            <div>
                                <p className="text-[13px] font-semibold text-slate-500 mb-1">ยอดขอเบิกทั้งหมด</p>
                                <h3 className="text-2xl font-bold text-slate-800">{formatCurrency(dashboardStats.totalClaim)}</h3>
                            </div>
                            <div className="w-14 h-14 rounded-full bg-blue-50 text-brand-600 flex items-center justify-center">
                                <i className="fa-solid fa-file-invoice-dollar text-2xl"></i>
                            </div>
                        </div>

                        {/* Card 2 */}
                        <div className="bg-white rounded-2xl p-5 shadow-card flex items-center justify-between border border-slate-100/50 hover:shadow-soft transition-shadow">
                            <div>
                                <p className="text-[13px] font-semibold text-slate-500 mb-1">ยอดจ่ายชดเชยแล้ว</p>
                                <h3 className="text-2xl font-bold text-emerald-600">{formatCurrency(dashboardStats.totalPaid)}</h3>
                            </div>
                            <div className="w-14 h-14 rounded-full bg-emerald-50 text-emerald-500 flex items-center justify-center">
                                <i className="fa-solid fa-hand-holding-dollar text-2xl"></i>
                            </div>
                        </div>

                        {/* Card 3 */}
                        <div className="bg-white rounded-2xl p-5 shadow-card flex items-center justify-between border border-slate-100/50 hover:shadow-soft transition-shadow">
                            <div>
                                <p className="text-[13px] font-semibold text-slate-500 mb-1">ได้รับการชดเชย</p>
                                <div className="flex items-end">
                                    <h3 className="text-2xl font-bold text-slate-800">{dashboardStats.successCount}</h3>
                                    <span className="text-sm text-slate-500 ml-1.5 mb-1 font-medium">รายการ</span>
                                </div>
                            </div>
                            <div className="w-14 h-14 rounded-full bg-green-50 text-green-500 flex items-center justify-center">
                                <i className="fa-solid fa-check-to-slot text-2xl"></i>
                            </div>
                        </div>

                        {/* Card 4 */}
                        <div className="bg-white rounded-2xl p-5 shadow-card flex items-center justify-between border border-slate-100/50 hover:shadow-soft transition-shadow">
                            <div>
                                <p className="text-[13px] font-semibold text-slate-500 mb-1">รอชดเชย / ติด C</p>
                                <div className="flex items-end">
                                    <h3 className="text-2xl font-bold text-slate-800">{dashboardStats.pendingCount}</h3>
                                    <span className="text-sm text-slate-500 ml-1.5 mb-1 font-medium">รายการ</span>
                                </div>
                            </div>
                            <div className="w-14 h-14 rounded-full bg-amber-50 text-amber-500 flex items-center justify-center">
                                <i className="fa-solid fa-clock-rotate-left text-2xl"></i>
                            </div>
                        </div>
                    </div>

                    {/* Modern Data Table */}
                    <div className="bg-white rounded-2xl shadow-card overflow-hidden border border-slate-100/50 mt-8">
                        <div className="px-6 py-5 border-b border-slate-100 flex justify-between items-center bg-white">
                            <h3 className="text-lg font-bold text-slate-800 flex items-center">
                                <i className="fa-solid fa-table-list mr-3 text-brand-500"></i> รายการเบิกล่าสุด (10 รายการ)
                            </h3>
                            <button className="text-sm font-medium text-brand-600 hover:text-brand-800 flex items-center bg-blue-50 px-3 py-1.5 rounded-lg transition-colors">
                                ข้อมูลจาก Sheet <i className="fa-solid fa-arrow-right ml-2 text-xs"></i>
                            </button>
                        </div>
                        <div className="overflow-x-auto">
                            <table className="min-w-full text-left border-collapse">
                                <thead>
                                    <tr className="border-b border-slate-100 bg-slate-50/50">
                                        <th className="px-6 py-4 text-xs font-bold text-slate-400 uppercase tracking-wider">วันที่รับบริการ</th>
                                        <th className="px-6 py-4 text-xs font-bold text-slate-400 uppercase tracking-wider">ชื่อผู้ป่วย</th>
                                        <th className="px-6 py-4 text-xs font-bold text-slate-400 uppercase tracking-wider text-right">ขอเบิก (บาท)</th>
                                        <th className="px-6 py-4 text-xs font-bold text-slate-400 uppercase tracking-wider text-right">ชดเชย (บาท)</th>
                                        <th className="px-6 py-4 text-xs font-bold text-slate-400 uppercase tracking-wider text-center">สถานะ</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100">
                                    {mockData.slice(0, 10).map((row, idx) => {
                                        const isSuccess = row.status && row.status.includes('ได้รับชดเชยแล้ว');
                                        return (
                                        <tr key={idx} className="hover:bg-slate-50/80 transition-colors group">
                                            <td className="px-6 py-4 whitespace-nowrap text-sm text-slate-500 font-medium">{row.date}</td>
                                            <td className="px-6 py-4 whitespace-nowrap">
                                                <div className="flex items-center">
                                                    <div className="w-8 h-8 rounded-full bg-brand-50 text-brand-600 flex items-center justify-center text-xs font-bold mr-3 border border-brand-100">
                                                        {row.name ? row.name.charAt(0) : '?'}
                                                    </div>
                                                    <span className="text-sm font-bold text-slate-700 group-hover:text-brand-600 transition-colors">{row.name}</span>
                                                </div>
                                            </td>
                                            <td className="px-6 py-4 whitespace-nowrap text-sm text-right text-slate-500 font-medium">{formatCurrency(row.claim)}</td>
                                            <td className="px-6 py-4 whitespace-nowrap text-sm text-right font-bold text-emerald-600">{formatCurrency(row.paid)}</td>
                                            <td className="px-6 py-4 whitespace-nowrap text-center">
                                                <span className={`inline-flex items-center px-2.5 py-1 rounded-md text-[11px] font-bold uppercase tracking-wider ${
                                                    isSuccess ? 'bg-green-100/80 text-green-700' : 'bg-amber-100/80 text-amber-700'
                                                }`}>
                                                    <span className={`w-1.5 h-1.5 rounded-full mr-1.5 ${isSuccess ? 'bg-green-500' : 'bg-amber-500'}`}></span>
                                                    {row.status || 'รอตรวจสอบ'}
                                                </span>
                                            </td>
                                        </tr>
                                    )})}
                                    {mockData.length === 0 && (
                                        <tr>
                                            <td colSpan="5" className="px-6 py-12 text-center text-slate-400">
                                                <i className="fa-solid fa-box-open text-4xl mb-3 text-slate-300"></i>
                                                <p className="font-medium">ไม่พบข้อมูล หรือระบบกำลังประมวลผล</p>
                                            </td>
                                        </tr>
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );

            // ==========================================
            // 4. Admin Login View 
            // ==========================================
            const renderLogin = () => (
                <div className="flex items-center justify-center h-[calc(100vh-160px)] fade-in">
                    <div className="bg-white p-8 sm:p-10 rounded-[24px] shadow-card border border-slate-100 w-full max-w-md relative overflow-hidden">
                        {/* Decorative background shape */}
                        <div className="absolute -top-20 -right-20 w-40 h-40 bg-brand-50 rounded-full blur-3xl opacity-60"></div>
                        
                        <div className="text-center mb-8 relative z-10">
                            <div className="mx-auto bg-brand-50 w-16 h-16 rounded-2xl flex items-center justify-center mb-4 text-brand-600">
                                <i className="fa-solid fa-fingerprint text-3xl"></i>
                            </div>
                            <h2 className="text-2xl font-bold text-slate-800">เข้าสู่ระบบ</h2>
                            <p className="text-sm text-slate-500 mt-1">สิทธิ์เฉพาะเจ้าหน้าที่ผู้ดูแลระบบเท่านั้น</p>
                        </div>

                        <form onSubmit={handleLogin} className="space-y-5 relative z-10">
                            {loginError && (
                                <div className="bg-red-50 text-red-600 p-3.5 rounded-xl text-sm flex items-start">
                                    <i className="fa-solid fa-circle-exclamation mt-0.5 mr-2"></i> 
                                    <span className="font-medium">{loginError}</span>
                                </div>
                            )}
                            
                            <div>
                                <label className="block text-[13px] font-bold text-slate-700 mb-1.5 ml-1">ชื่อผู้ใช้งาน (Username)</label>
                                <div className="relative">
                                    <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400">
                                        <i className="fa-solid fa-user text-sm"></i>
                                    </div>
                                    <input 
                                        type="text" 
                                        value={username}
                                        onChange={(e) => setUsername(e.target.value)}
                                        className="w-full pl-11 pr-4 py-3.5 bg-slate-50/50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 focus:bg-white outline-none transition-all text-slate-800 text-sm font-medium"
                                        placeholder="Username"
                                        required
                                    />
                                </div>
                            </div>
                            
                            <div>
                                <label className="block text-[13px] font-bold text-slate-700 mb-1.5 ml-1">รหัสผ่าน (Password)</label>
                                <div className="relative">
                                    <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400">
                                        <i className="fa-solid fa-lock text-sm"></i>
                                    </div>
                                    <input 
                                        type="password" 
                                        value={password}
                                        onChange={(e) => setPassword(e.target.value)}
                                        className="w-full pl-11 pr-4 py-3.5 bg-slate-50/50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 focus:bg-white outline-none transition-all text-slate-800 text-sm font-medium"
                                        placeholder="••••••••"
                                        required
                                    />
                                </div>
                            </div>

                            <button 
                                type="submit" 
                                className="w-full bg-brand-600 hover:bg-brand-700 text-white font-bold py-3.5 px-4 rounded-xl transition-all shadow-md shadow-brand-500/30 mt-6 active:scale-[0.98]"
                            >
                                เข้าสู่ระบบ
                            </button>
                        </form>
                    </div>
                </div>
            );

            // ==========================================
            // 5. Individual Check View (Search & Detail)
            // ==========================================
            const renderIndividualCheck = () => {
                const filteredData = mockData.filter(item => 
                    (item.cid && item.cid.includes(searchQuery)) || (item.name && item.name.includes(searchQuery))
                );
                const filteredStatement = mockStatement.filter(item => 
                    (item.cid && item.cid.includes(searchQuery)) || (item.name && item.name.includes(searchQuery))
                );
                const hasSearched = searchQuery.trim().length >= 2;

                return (
                    <div className="space-y-6 fade-in">
                        
                        {/* Modern Search Box */}
                        <div className="bg-white p-8 rounded-2xl shadow-card border border-slate-100 relative overflow-hidden">
                            <div className="absolute right-0 top-0 w-64 h-full bg-gradient-to-l from-brand-50 to-transparent opacity-50 pointer-events-none"></div>
                            
                            <h2 className="text-2xl font-bold text-slate-800 mb-2">ค้นหาประวัติผู้ป่วย</h2>
                            <p className="text-sm text-slate-500 mb-6">ระบุเลขบัตรประชาชน 13 หลัก (CID) หรือชื่อ-นามสกุล เพื่อตรวจสอบประวัติ</p>
                            
                            <div className="relative max-w-2xl">
                                <div className="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none">
                                    <i className="fa-solid fa-magnifying-glass text-brand-500 text-lg"></i>
                                </div>
                                <input
                                    type="text"
                                    className="block w-full pl-14 pr-12 py-4 border border-slate-200 rounded-xl bg-slate-50/50 text-slate-800 placeholder-slate-400 focus:outline-none focus:bg-white focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 text-base font-medium transition-all shadow-sm"
                                    placeholder="ค้นหา..."
                                    value={searchQuery}
                                    onChange={(e) => setSearchQuery(e.target.value)}
                                />
                                {searchQuery && (
                                    <button 
                                        onClick={() => setSearchQuery('')}
                                        className="absolute inset-y-0 right-0 pr-5 flex items-center text-slate-400 hover:text-slate-600 transition-colors"
                                    >
                                        <i className="fa-solid fa-xmark text-lg"></i>
                                    </button>
                                )}
                            </div>
                        </div>

                        {/* Search Results */}
                        {hasSearched && (
                            <div className="grid grid-cols-1 gap-8 mt-6">
                                
                                {/* Table 1: Data Summary */}
                                <div className="bg-white rounded-2xl shadow-card overflow-hidden border border-slate-100">
                                    <div className="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-white">
                                        <h3 className="text-base font-bold text-slate-800 flex items-center">
                                            <div className="w-8 h-8 rounded-lg bg-blue-50 text-brand-600 flex items-center justify-center mr-3">
                                                <i className="fa-solid fa-file-waveform text-sm"></i>
                                            </div>
                                            สรุปข้อมูลขอเบิก (Data)
                                        </h3>
                                        <span className="text-xs font-bold bg-slate-100 text-slate-600 px-3 py-1.5 rounded-lg">
                                            พบ {filteredData.length} รายการ
                                        </span>
                                    </div>
                                    
                                    {filteredData.length > 0 ? (
                                        <div className="overflow-x-auto">
                                            <table className="min-w-full text-left border-collapse">
                                                <thead>
                                                    <tr className="bg-slate-50/50 border-b border-slate-100">
                                                        <th className="px-6 py-4 text-xs font-bold text-slate-400 uppercase tracking-wider">CID</th>
                                                        <th className="px-6 py-4 text-xs font-bold text-slate-400 uppercase tracking-wider">ชื่อ - นามสกุล</th>
                                                        <th className="px-6 py-4 text-xs font-bold text-slate-400 uppercase tracking-wider">วันที่รับบริการ</th>
                                                        <th className="px-6 py-4 text-xs font-bold text-slate-400 uppercase tracking-wider text-right">ขอเบิก</th>
                                                        <th className="px-6 py-4 text-xs font-bold text-slate-400 uppercase tracking-wider text-right">ชดเชย</th>
                                                        <th className="px-6 py-4 text-xs font-bold text-slate-400 uppercase tracking-wider text-center">สถานะ</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-100">
                                                    {filteredData.map((row, idx) => {
                                                        const isSuccess = row.status && row.status.includes('ได้รับชดเชยแล้ว');
                                                        return(
                                                        <tr key={idx} className="hover:bg-slate-50 transition-colors">
                                                            <td className="px-6 py-4 whitespace-nowrap text-sm font-mono text-slate-500">{row.cid}</td>
                                                            <td className="px-6 py-4 whitespace-nowrap text-sm font-bold text-slate-700">{row.name}</td>
                                                            <td className="px-6 py-4 whitespace-nowrap text-sm text-slate-500">{row.date}</td>
                                                            <td className="px-6 py-4 whitespace-nowrap text-sm text-right text-slate-500">{formatCurrency(row.claim)}</td>
                                                            <td className="px-6 py-4 whitespace-nowrap text-sm text-right font-bold text-emerald-600">{formatCurrency(row.paid)}</td>
                                                            <td className="px-6 py-4 whitespace-nowrap text-center">
                                                                <span className={`inline-flex items-center px-2.5 py-1 rounded-md text-[11px] font-bold uppercase tracking-wider ${
                                                                    isSuccess ? 'bg-green-100/80 text-green-700' : 'bg-amber-100/80 text-amber-700'
                                                                }`}>
                                                                    <span className={`w-1.5 h-1.5 rounded-full mr-1.5 ${isSuccess ? 'bg-green-500' : 'bg-amber-500'}`}></span>
                                                                    {row.status}
                                                                </span>
                                                            </td>
                                                        </tr>
                                                    )})}
                                                </tbody>
                                            </table>
                                        </div>
                                    ) : (
                                        <div className="p-10 text-center text-slate-400">
                                            <p className="font-medium">ไม่พบประวัติสำหรับคำค้นหานี้</p>
                                        </div>
                                    )}
                                </div>

                                {/* Table 2: Statement Details */}
                                <div className="bg-white rounded-2xl shadow-card overflow-hidden border border-slate-100">
                                    <div className="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-white">
                                        <h3 className="text-base font-bold text-slate-800 flex items-center">
                                            <div className="w-8 h-8 rounded-lg bg-emerald-50 text-emerald-500 flex items-center justify-center mr-3">
                                                <i className="fa-solid fa-money-bill-transfer text-sm"></i>
                                            </div>
                                            รายละเอียดเงินโอน (Statement)
                                        </h3>
                                        <span className="text-xs font-bold bg-slate-100 text-slate-600 px-3 py-1.5 rounded-lg">
                                            พบ {filteredStatement.length} รายการ
                                        </span>
                                    </div>
                                    
                                    {filteredStatement.length > 0 ? (
                                        <div className="overflow-x-auto">
                                            <table className="min-w-full text-left border-collapse">
                                                <thead>
                                                    <tr className="bg-slate-50/50 border-b border-slate-100">
                                                        <th className="px-6 py-4 text-xs font-bold text-slate-400 uppercase tracking-wider">Rep No. (งวด)</th>
                                                        <th className="px-6 py-4 text-xs font-bold text-slate-400 uppercase tracking-wider">วันที่รับบริการ</th>
                                                        <th className="px-6 py-4 text-xs font-bold text-slate-400 uppercase tracking-wider">สิทธิ์</th>
                                                        <th className="px-6 py-4 text-xs font-bold text-slate-400 uppercase tracking-wider">รายการเบิก</th>
                                                        <th className="px-6 py-4 text-xs font-bold text-slate-400 uppercase tracking-wider text-right">ยอดขอเบิก</th>
                                                        <th className="px-6 py-4 text-xs font-bold text-emerald-600 uppercase tracking-wider text-right">จ่ายชดเชยสุทธิ</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-100">
                                                    {filteredStatement.map((row, idx) => (
                                                        <tr key={idx} className="hover:bg-slate-50 transition-colors">
                                                            <td className="px-6 py-4 whitespace-nowrap text-sm font-mono text-slate-500">{row.repNo}</td>
                                                            <td className="px-6 py-4 whitespace-nowrap text-sm font-bold text-slate-700">{row.date}</td>
                                                            <td className="px-6 py-4 whitespace-nowrap text-sm">
                                                                <span className="px-2.5 py-1 bg-slate-100 text-slate-600 rounded-md text-[11px] font-bold tracking-wider">
                                                                    {row.right}
                                                                </span>
                                                            </td>
                                                            <td className="px-6 py-4 text-sm text-slate-600 max-w-xs truncate" title={row.item}>{row.item}</td>
                                                            <td className="px-6 py-4 whitespace-nowrap text-sm text-right text-slate-500">{formatCurrency(row.claim)}</td>
                                                            <td className="px-6 py-4 whitespace-nowrap text-sm text-right font-bold text-emerald-600">{formatCurrency(row.paid)}</td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    ) : (
                                        <div className="p-10 text-center text-slate-400">
                                            <p className="font-medium">ไม่พบข้อมูล Statement (อาจอยู่ระหว่างรอการโอนเงิน)</p>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </div>
                );
            };

            return (
                <div className="flex h-screen bg-background font-sans">
                    {/* Sidebar Area */}
                    {renderSidebar()}

                    {/* Mobile Overlay */}
                    {isSidebarOpen && (
                        <div 
                            className="fixed inset-0 bg-[#0b1437]/60 backdrop-blur-sm z-40 lg:hidden transition-opacity"
                            onClick={() => setIsSidebarOpen(false)}
                        ></div>
                    )}

                    {/* Main Content */}
                    <div className="flex-1 flex flex-col overflow-hidden relative">
                        {renderHeader()}

                        <main className="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8 scroll-smooth">
                            {isLoading ? (
                                <div className="flex flex-col items-center justify-center h-full min-h-[50vh]">
                                    <div className="loader mb-4"></div>
                                    <p className="text-slate-500 font-medium text-sm animate-pulse">กำลังโหลดข้อมูล...</p>
                                </div>
                            ) : fetchError ? (
                                <div className="bg-white p-8 rounded-2xl shadow-card border border-red-100 text-center max-w-xl mx-auto mt-10">
                                    <div className="w-16 h-16 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4">
                                        <i className="fa-solid fa-triangle-exclamation text-2xl"></i>
                                    </div>
                                    <h3 className="text-lg font-bold text-slate-800 mb-2">เกิดข้อผิดพลาด</h3>
                                    <p className="text-slate-500 text-sm">{fetchError}</p>
                                    <button onClick={() => window.location.reload()} className="mt-6 px-6 py-2.5 bg-slate-900 text-white rounded-xl hover:bg-slate-800 font-medium transition-colors text-sm">
                                        โหลดหน้าใหม่อีกครั้ง
                                    </button>
                                </div>
                            ) : (
                                <div className="max-w-7xl mx-auto pb-10">
                                    {currentView === 'dashboard' && renderDashboard()}
                                    {currentView === 'admin-login' && renderLogin()}
                                    {currentView === 'individual-check' && (
                                        isAdmin ? renderIndividualCheck() : renderLogin()
                                    )}
                                </div>
                            )}
                        </main>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
